name: Deploy — App

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "prisma/**"
      - "public/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "package.json"
      - "package-lock.json"
      - "next.config.mjs"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION:  us-east-1
  ECR_REPO:    450328359598.dkr.ecr.us-east-1.amazonaws.com/practicas-itm
  ECS_CLUSTER: practicas-itm
  ECS_SERVICE: santa-elena-app-prod

jobs:
  # ─── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test -- --run

  # ─── 2. Build y push imagen Docker ──────────────────────────────────────────
  build:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generar tag de imagen
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build y push imagen de la app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REPO }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REPO }}:latest
          cache-to: type=inline

      - name: Build y push imagen de PostgreSQL
        uses: docker/build-push-action@v5
        with:
          context: ./infra/docker/postgres
          push: true
          tags: ${{ env.ECR_REPO }}:postgres-16
          cache-from: type=registry,ref=${{ env.ECR_REPO }}:postgres-16
          cache-to: type=inline

  # ─── 3. Deploy ECS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy ECS
    runs-on: ubuntu-latest
    needs: build
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Obtener task definition actual
        run: |
          aws ecs describe-task-definition \
            --task-definition santa-elena-app-prod \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Actualizar imagen en task definition
        id: update-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy a ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-task-def.outputs.task-definition }}
          service:         ${{ env.ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Resumen del despliegue
        run: |
          echo "### ✅ Despliegue completado" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Imagen | \`${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | \`${{ env.ECS_SERVICE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`${{ env.ECS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://santaelenacomunidad.online |" >> $GITHUB_STEP_SUMMARY
