name: Deploy — Santa Elena Platform

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de despliegue'
        required: true
        default: 'prod'
        type: choice
        options: [prod, staging]

env:
  AWS_REGION:      us-east-1
  AWS_ACCOUNT_ID:  450328359598
  ECR_REPO:        450328359598.dkr.ecr.us-east-1.amazonaws.com/practicas-itm
  ECS_CLUSTER:     practicas-itm
  ECS_SERVICE:     santa-elena-app-prod
  TF_STATE_BUCKET: practicas-itm-tfstate-450328359598
  TF_STATE_KEY:    santa-elena-platform/terraform.tfstate

jobs:
  # ─── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test -- --run

  # ─── 2. Build y push imagen Docker ──────────────────────────────────────────
  build:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generar tag de imagen
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image=${{ env.ECR_REPO }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build y push imagen de la app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REPO }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REPO }}:latest
          cache-to: type=inline

      - name: Build y push imagen de PostgreSQL
        uses: docker/build-push-action@v5
        with:
          context: ./infra/docker/postgres
          push: true
          tags: |
            ${{ env.ECR_REPO }}:postgres-16
          cache-from: type=registry,ref=${{ env.ECR_REPO }}:postgres-16
          cache-to: type=inline

  # ─── 3. Terraform ───────────────────────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        working-directory: infra
        env:
          TF_VAR_aws_account_id:       ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region:           ${{ env.AWS_REGION }}
          TF_VAR_nextauth_secret:      ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url:         ${{ secrets.NEXTAUTH_URL }}
          # Google OAuth — opcional, se puede agregar después sin redeploy
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID || '' }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
          TF_VAR_twilio_account_sid:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TF_VAR_twilio_phone_number:  ${{ secrets.TWILIO_PHONE_NUMBER }}
          # VAPID — opcional, se puede agregar después
          TF_VAR_vapid_public_key:     ${{ secrets.VAPID_PUBLIC_KEY || '' }}
          TF_VAR_vapid_private_key:    ${{ secrets.VAPID_PRIVATE_KEY || '' }}
          TF_VAR_postgres_password:    ${{ secrets.POSTGRES_PASSWORD }}
        run: terraform plan -var-file=environments/prod.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        env:
          TF_VAR_aws_account_id:       ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region:           ${{ env.AWS_REGION }}
          TF_VAR_nextauth_secret:      ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url:         ${{ secrets.NEXTAUTH_URL }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID || '' }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
          TF_VAR_twilio_account_sid:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TF_VAR_twilio_phone_number:  ${{ secrets.TWILIO_PHONE_NUMBER }}
          TF_VAR_vapid_public_key:     ${{ secrets.VAPID_PUBLIC_KEY || '' }}
          TF_VAR_vapid_private_key:    ${{ secrets.VAPID_PRIVATE_KEY || '' }}
          TF_VAR_postgres_password:    ${{ secrets.POSTGRES_PASSWORD }}
        run: terraform apply -auto-approve tfplan

  # ─── 4. Deploy ECS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy ECS
    runs-on: ubuntu-latest
    needs: [build, terraform]

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Obtener task definition actual
        id: get-task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition santa-elena-app-prod \
            --query 'taskDefinition' \
            --output json)
          echo "$TASK_DEF" > task-definition.json

      - name: Actualizar imagen en task definition
        id: update-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy a ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-task-def.outputs.task-definition }}
          service:         ${{ env.ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Notificar despliegue exitoso
        if: success()
        run: |
          echo "✅ Despliegue completado"
          echo "Imagen: ${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}"
          echo "Servicio: ${{ env.ECS_SERVICE }}"
          echo "Cluster: ${{ env.ECS_CLUSTER }}"
