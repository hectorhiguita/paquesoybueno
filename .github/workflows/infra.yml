name: Infra — Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      action:
        description: 'Accion de Terraform'
        required: true
        default: 'apply'
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  AWS_REGION:      us-east-1
  AWS_ACCOUNT_ID:  450328359598
  TF_STATE_BUCKET: practicas-itm-tfstate-450328359598
  TF_STATE_KEY:    santa-elena-platform/terraform.tfstate
  TF_VERSION:      1.7.0

# Variables TF comunes — se reutilizan en todos los pasos
defaults:
  run:
    working-directory: infra

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan') || 'apply' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name != 'pull_request' && 'prod' || '' }}

    env:
      TF_VAR_aws_account_id:       ${{ vars.AWS_ACCOUNT_ID || '450328359598' }}
      TF_VAR_aws_region:           us-east-1
      TF_VAR_nextauth_secret:      ${{ secrets.NEXTAUTH_SECRET }}
      TF_VAR_nextauth_url:         ${{ secrets.NEXTAUTH_URL }}
      TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID || '' }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
      TF_VAR_twilio_account_sid:   ${{ secrets.TWILIO_ACCOUNT_SID }}
      TF_VAR_twilio_auth_token:    ${{ secrets.TWILIO_AUTH_TOKEN }}
      TF_VAR_twilio_phone_number:  ${{ secrets.TWILIO_PHONE_NUMBER }}
      TF_VAR_vapid_public_key:     ${{ secrets.VAPID_PUBLIC_KEY || '' }}
      TF_VAR_vapid_private_key:    ${{ secrets.VAPID_PRIVATE_KEY || '' }}
      TF_VAR_postgres_password:    ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      # Limpia del estado recursos que ahora son data sources
      # e importa recursos que ya existen en AWS
      - name: Limpiar estado obsoleto e importar recursos existentes
        if: github.event_name != 'pull_request'
        run: |
          terraform state rm module.alb.aws_security_group.alb 2>/dev/null || true
          terraform state rm module.ecs.aws_security_group.ecs_tasks 2>/dev/null || true

          # Importar el SG de ECS tasks si ya existe en AWS pero no en el estado
          ECS_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=santa-elena-ecs-tasks-prod" \
                      "Name=vpc-id,Values=vpc-05b9e9c5f8cccd4bd" \
            --query "SecurityGroups[0].GroupId" \
            --output text 2>/dev/null || echo "")

          if [ -n "$ECS_SG_ID" ] && [ "$ECS_SG_ID" != "None" ]; then
            echo "Importando SG de ECS tasks: $ECS_SG_ID"
            terraform import \
              -var-file=environments/prod.tfvars \
              module.ecs.aws_security_group.ecs_tasks "$ECS_SG_ID" 2>/dev/null || true
          fi

      # ── PR: solo plan ────────────────────────────────────────────────────────
      - name: Terraform Plan (PR)
        if: github.event_name == 'pull_request'
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Comentar plan en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            try {
              const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
              const truncated = plan.length > 60000
                ? plan.substring(0, 60000) + '\n\n... (truncado)'
                : plan;
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
              });
            } catch (e) {
              core.warning(`No se pudo comentar el plan: ${e.message}`);
            }

      # ── Push a main / workflow_dispatch apply: plan + apply en un solo paso ──
      - name: Terraform Apply
        if: |
          github.event_name != 'pull_request' &&
          (github.event.inputs.action == 'apply' || github.event.inputs.action == null)
        run: |
          terraform apply \
            -auto-approve \
            -var-file=environments/prod.tfvars

      # ── Destroy manual ───────────────────────────────────────────────────────
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -auto-approve \
            -var-file=environments/prod.tfvars
