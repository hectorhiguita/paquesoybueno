name: Infra — Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción de Terraform'
        required: true
        default: 'apply'
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION:      us-east-1
  AWS_ACCOUNT_ID:  450328359598
  TF_STATE_BUCKET: practicas-itm-tfstate-450328359598
  TF_STATE_KEY:    santa-elena-platform/terraform.tfstate
  TF_VERSION:      1.7.0

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan') || 'apply' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name != 'pull_request' && 'prod' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infra
        env:
          TF_VAR_aws_account_id:       ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region:           ${{ env.AWS_REGION }}
          TF_VAR_nextauth_secret:      ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url:         ${{ secrets.NEXTAUTH_URL }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID || '' }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
          TF_VAR_twilio_account_sid:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TF_VAR_twilio_phone_number:  ${{ secrets.TWILIO_PHONE_NUMBER }}
          TF_VAR_vapid_public_key:     ${{ secrets.VAPID_PUBLIC_KEY || '' }}
          TF_VAR_vapid_private_key:    ${{ secrets.VAPID_PRIVATE_KEY || '' }}
          TF_VAR_postgres_password:    ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -out=tfplan \
            -detailed-exitcode 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # En PRs, publica el plan como comentario
      - name: Comentar plan en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncado)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      # Apply solo en push a main o workflow_dispatch con action=apply
      - name: Terraform Apply
        if: |
          github.event_name != 'pull_request' &&
          (github.event.inputs.action == 'apply' || github.event.inputs.action == null)
        working-directory: infra
        env:
          TF_VAR_aws_account_id:       ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region:           ${{ env.AWS_REGION }}
          TF_VAR_nextauth_secret:      ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url:         ${{ secrets.NEXTAUTH_URL }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID || '' }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
          TF_VAR_twilio_account_sid:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TF_VAR_twilio_phone_number:  ${{ secrets.TWILIO_PHONE_NUMBER }}
          TF_VAR_vapid_public_key:     ${{ secrets.VAPID_PUBLIC_KEY || '' }}
          TF_VAR_vapid_private_key:    ${{ secrets.VAPID_PRIVATE_KEY || '' }}
          TF_VAR_postgres_password:    ${{ secrets.POSTGRES_PASSWORD }}
        run: terraform apply -auto-approve tfplan

      # Destroy solo si se dispara manualmente con action=destroy
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: infra
        env:
          TF_VAR_aws_account_id:       ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region:           ${{ env.AWS_REGION }}
          TF_VAR_nextauth_secret:      ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url:         ${{ secrets.NEXTAUTH_URL }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID || '' }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
          TF_VAR_twilio_account_sid:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TF_VAR_twilio_phone_number:  ${{ secrets.TWILIO_PHONE_NUMBER }}
          TF_VAR_vapid_public_key:     ${{ secrets.VAPID_PUBLIC_KEY || '' }}
          TF_VAR_vapid_private_key:    ${{ secrets.VAPID_PRIVATE_KEY || '' }}
          TF_VAR_postgres_password:    ${{ secrets.POSTGRES_PASSWORD }}
        run: terraform destroy -auto-approve -var-file=environments/prod.tfvars
